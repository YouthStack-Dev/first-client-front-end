name: Deploy — Production (fleet.mltcorporate.com)

# ──────────────────────────────────────────────
# Triggers on every direct push to main
# API target: https://api.mltcorporate.com
# ──────────────────────────────────────────────
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # .env.production already sets VITE_API_URL=https://api.mltcorporate.com/api/v1
      # Append remaining secrets (Google Maps key, debug flag, etc.)
      - name: Inject additional secrets into .env.production
        run: |
          echo "VITE_DEBUG=${{ secrets.VITE_DEBUG }}" >> .env.production
          echo "VITE_GOOGLE_API=${{ secrets.VITE_GOOGLE_API }}" >> .env.production

      - name: Install dependencies
        run: npm ci

      - name: Build (production mode → uses .env.production)
        run: npm run build:production

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/*"
          target: "/var/www/fleet.mltcorporate.com/"

      - name: Reload nginx on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          port: ${{ secrets.VPS_PORT }}
          script: sudo systemctl reload nginx
